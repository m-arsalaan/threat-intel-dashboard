<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Threat Intel Dashboard{% endblock %}</title>

    <!-- Bootstrap 5 — handles all layout and styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Our custom styles -->
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>

<!-- Navigation bar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/">
            <i class="bi bi-shield-exclamation text-danger"></i>
            ThreatIntel Dashboard
        </a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
            <a class="nav-link {% if request.path == '/iocs' %}active{% endif %}" href="/iocs">
                <i class="bi bi-table"></i> IOC Table
            </a>
            <a class="nav-link {% if request.path == '/lookup' %}active{% endif %}" href="/lookup">
                <i class="bi bi-search"></i> Lookup
            </a>
        </div>
    </div>
</nav>

<!-- Page content -->
<div class="container-fluid mt-4 px-4">
    {% block content %}{% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Chart.js for charts -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

{% block scripts %}{% endblock %}
</body>
</html>
